version: "3.9"

services:

  # ── TimescaleDB (our main database) ───────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: trainradar_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: trainradar
      POSTGRES_PASSWORD: trainradar_secret
      POSTGRES_DB: trainradar_db
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trainradar -d trainradar_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Zookeeper (Kafka needs this to run) ───────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: trainradar_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # ── Kafka (our message broker) ────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: trainradar_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # ── Kafka UI (visual dashboard for Kafka) ─────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: trainradar_kafka_ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: trainradar
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ── Redis (our cache) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: trainradar_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  timescale_data:
  redis_data: